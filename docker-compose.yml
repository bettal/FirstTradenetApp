services:
  postgres:
    image: postgres:17-alpine
    env_file: .env.docker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_started
        required: false
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ── Optional: HashiCorp Vault for secret management ──────────────
  # To enable: docker compose --profile vault up
  # Access:   http://localhost:8200
  # Init:     docker compose exec vault vault operator init
  # Unseal:   docker compose exec vault vault operator unseal <key>
  vault:
    image: vault:1.18
    profiles: ["vault"]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"

volumes:
  pgdata:
