<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradernet Dashboard - Login</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="/styles.css?v=2">
</head>
<body>
    <div class="auth-wrapper">
        <div class="glass-panel auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <h2>Welcome</h2>
                <p>Sign in to your account</p>
            </div>

            <div id="step-auth">
                <form id="auth-form">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="+1 234 567 8900" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button type="submit" id="btn-login" style="flex: 1;">Login</button>
                        <button type="button" id="btn-register" class="btn-secondary" style="flex: 1;">Register</button>
                    </div>
                    <div id="auth-error" class="error-message hidden"></div>
                </form>
            </div>

            <div id="step-2fa" class="hidden">
                <form id="code-form">
                    <div style="text-align: center; margin-bottom: 1.5rem;">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <h3 style="margin-bottom: 0.5rem; font-size: 1.1rem;">Two-Factor Authentication</h3>
                        <p style="font-size: 0.875rem;">Enter the 6-digit code from Google Authenticator.</p>
                    </div>
                    <div class="form-group">
                        <label for="code">Verification Code</label>
                        <input type="text" id="code" placeholder="Enter 6-digit code" required autocomplete="off" maxlength="6">
                    </div>
                    <button type="submit">Verify & Login</button>
                    <div id="code-error" class="error-message hidden"></div>
                </form>
                <div style="text-align: center; margin-top: 1rem;">
                    <button type="button" class="btn-secondary" id="btn-back" style="padding: 0.5rem 1rem; font-size: 0.875rem; width: auto;">Back to Login</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/app.js"></script>
</body>
</html>
