<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradernet Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header class="dashboard-header">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <h2>My Portfolios</h2>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button id="btn-open-modal" style="width: auto;">+ Connect Wallet</button>
                <button id="btn-logout" class="btn-secondary" style="width: auto;">Logout</button>
            </div>
        </header>

        <main>
            <div id="wallets-container" class="wallets-grid">
                <!-- Wallets will be injected here -->
            </div>
        </main>
    </div>

    <!-- Connect Wallet Modal -->
    <div id="connect-modal" class="modal-overlay">
        <div class="glass-panel modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3>Connect Tradernet Wallet</h3>
                <button id="btn-close-modal" class="btn-secondary" style="width: auto; padding: 0.25rem 0.5rem; border: none; font-size: 1.5rem;">&times;</button>
            </div>
            <form id="wallet-form">
                <div class="form-group">
                    <label for="wallet-name">Wallet Name</label>
                    <input type="text" id="wallet-name" placeholder="e.g., Main Investment" required>
                </div>
                <div class="form-group">
                    <label for="api-key">API Key</label>
                    <input type="text" id="api-key" placeholder="Enter Tradernet API Key" required>
                </div>
                <div class="form-group">
                    <label for="secret-key">Secret Key</label>
                    <input type="password" id="secret-key" placeholder="Enter Tradernet Secret Key" required>
                </div>
                <button type="submit">Connect Wallet</button>
                <div id="wallet-error" class="error-message hidden"></div>
            </form>
        </div>
    <!-- API Explorer Modal -->
    <div id="explorer-modal" class="modal-overlay">
        <div class="glass-panel modal-content" style="max-width: 800px; width: 90vw;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 id="explorer-title">API Explorer</h3>
                <button id="btn-close-explorer" class="btn-secondary" style="width: auto; padding: 0.25rem 0.5rem; border: none; font-size: 1.5rem;">&times;</button>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <!-- Input Section -->
                <div>
                    <form id="explorer-form">
                        <input type="hidden" id="explorer-wallet-id">
                        <div class="form-group">
                            <label for="api-cmd">Command Name (cmd)</label>
                            <input type="text" id="api-cmd" placeholder="e.g. getSecurityInfo" required>
                        </div>
                        <div class="form-group">
                            <label for="api-params">Parameters (JSON)</label>
                            <textarea id="api-params" rows="8" placeholder='{"ticker": "AAPL.US"}' style="width: 100%; padding: 0.75rem 1rem; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-main); font-family: monospace; font-size: 0.875rem; resize: vertical;"></textarea>
                        </div>
                        <button type="submit">Send Request</button>
                        <div id="explorer-error" class="error-message hidden"></div>
                    </form>
                </div>

                <!-- Output Section -->
                <div style="display: flex; flex-direction: column;">
                    <label style="margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500;">Response</label>
                    <div style="flex-grow: 1; background: #000; border: 1px solid var(--glass-border); border-radius: 8px; overflow: hidden; position: relative;">
                        <pre id="api-response" style="margin: 0; padding: 1rem; color: #a5b4fc; font-family: monospace; font-size: 0.875rem; overflow-y: auto; height: 100%; position: absolute; top: 0; left: 0; right: 0; bottom: 0;">Awaiting request...</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
